[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "RationalRecipes"
version = "1.0.0"
description = "Statistical analysis and comparison of recipe ratios"
requires-python = ">=3.12"
dependencies = [
    "numpy",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "mypy",
    "pytest",
    "pytest-cov",
    "pre-commit",
    "jsonschema",
    "types-jsonschema",
]

[project.scripts]
rr-stats = "rational_recipes.stats_cli:run"
rr-diff = "rational_recipes.diff_cli:run"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
rational_recipes = ["data/*.db"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]

[tool.ruff.lint.per-file-ignores]
"tests/test_diff.py" = ["E501"]
"tests/test_stats.py" = ["E501"]
"src/rational_recipes/scrape/parse.py" = ["E501"]  # LLM prompt strings

[tool.mypy]
python_version = "3.12"
strict = true
