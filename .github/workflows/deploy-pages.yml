name: Deploy PWA to GitHub Pages

# Builds the web/ app and deploys dist/ to GitHub Pages.
# Triggers:
#  - Pushes to main that touch the web app, schema, or pipeline outputs
#    the PWA consumes.
#  - Manual "Run workflow" button from the Actions tab.
#
# Prerequisite (one-time, in repo Settings → Pages):
#  "Build and deployment" source = "GitHub Actions"
#
# Default deploy target is the project-URL style
# https://<owner>.github.io/RationalRecipes/ — VITE_BASE is set to
# "/RationalRecipes/" so absolute asset links and the service worker's
# scope resolve correctly. Override at workflow dispatch time if
# deploying behind a custom domain from the root.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "schema/**"
      - "sample_input/**"
      - "src/rational_recipes/**"
      - "artifacts/curated_recipes.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
    inputs:
      vite_base:
        description: 'Vite base path (e.g. "/RationalRecipes/" or "/")'
        required: false
        default: "/RationalRecipes/"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy. Cancel older runs in the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python deps (for catalog export)
        run: pip install -e ".[dev]"

      - name: Export catalog artifact
        run: python3 scripts/export_curated_recipes.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build PWA
        working-directory: web
        env:
          VITE_BASE: ${{ inputs.vite_base || '/RationalRecipes/' }}
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
